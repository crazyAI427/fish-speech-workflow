name: Build & Push Fish-Speech Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"           # triggers on version tags like v1.2.3
  pull_request:
    branches:
      - main               # builds (but does NOT push) on PRs for validation
  workflow_dispatch:       # allows manual trigger from GitHub UI
    inputs:
      target:
        description: "Which image to build"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - server
          - webui

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  FISH_SPEECH_REPO: https://github.com/fishaudio/fish-speech.git
  IMAGE_NAME: fish-speech

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Build & push the SERVER image
  # ──────────────────────────────────────────────────────────────
  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    # Skip if manual trigger chose "webui" only
    if: ${{ github.event.inputs.target != 'webui' }}

    steps:
      # 1. Check out YOUR repo (workflow lives here)
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      # 2. Clone fish-speech source code
      - name: Clone fish-speech repository
        run: |
          git clone --depth 1 ${{ env.FISH_SPEECH_REPO }} fish-speech
          echo "Fish-speech cloned at commit: $(git -C fish-speech rev-parse --short HEAD)"

      # 3. Set up QEMU (needed for cross-platform builds)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4. Set up Docker Buildx (advanced builder with cache support)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Log in to Docker Hub (skipped on PRs)
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Derive image tags automatically
      #    - branch push  → :latest + :sha-<short>
      #    - tag push     → :v1.2.3 + :latest + :sha-<short>
      #    - PR           → :pr-<number> (no push)
      - name: Extract Docker metadata (server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}-server
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=cuda,enable=${{ github.ref == 'refs/heads/main' }}

      # 7. Build & push SERVER image
      - name: Build and push SERVER image
        uses: docker/build-push-action@v5
        with:
          context: ./fish-speech          # cloned repo is the build context
          file: ./fish-speech/docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          target: server
          build-args: |
            BACKEND=cuda
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          # GitHub Actions cache speeds up repeat builds significantly
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      # 8. Print image digest for traceability
      - name: Print server image digest
        run: echo "Server image digest → ${{ steps.build-server.outputs.digest }}"

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Build & push the WEBUI image
  # ──────────────────────────────────────────────────────────────
  build-webui:
    name: Build WebUI Image
    runs-on: ubuntu-latest
    # Skip if manual trigger chose "server" only
    if: ${{ github.event.inputs.target != 'server' }}

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Clone fish-speech repository
        run: |
          git clone --depth 1 ${{ env.FISH_SPEECH_REPO }} fish-speech
          echo "Fish-speech cloned at commit: $(git -C fish-speech rev-parse --short HEAD)"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (webui)
        id: meta-webui
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}-webui
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=cuda,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push WEBUI image
        id: build-webui
        uses: docker/build-push-action@v5
        with:
          context: ./fish-speech
          file: ./fish-speech/docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          target: webui
          build-args: |
            BACKEND=cuda
          tags: ${{ steps.meta-webui.outputs.tags }}
          labels: ${{ steps.meta-webui.outputs.labels }}
          cache-from: type=gha,scope=webui
          cache-to: type=gha,mode=max,scope=webui

      - name: Print webui image digest
        run: echo "WebUI image digest → ${{ steps.build-webui.outputs.digest }}"

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — Summary (runs after both jobs regardless of outcome)
  # ──────────────────────────────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-server, build-webui]
    if: always()

    steps:
      - name: Report results
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Image  | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Server | ${{ needs.build-server.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebUI  | ${{ needs.build-webui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
